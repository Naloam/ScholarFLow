version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: scholarflow
      POSTGRES_PASSWORD: scholarflow
      POSTGRES_DB: scholarflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  grobid:
    image: lfoppiano/grobid:0.8.0
    ports:
      - "8070:8070"

volumes:
  postgres_data:
